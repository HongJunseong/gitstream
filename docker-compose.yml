version: "3.9"

# ── Shared Airflow config ──────────────────────────────────────────────────── #
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file: .env
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY:       ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES:    "false"
    AIRFLOW__API__AUTH_BACKENDS:     airflow.api.auth.backend.basic_auth
    KAFKA_BOOTSTRAP_SERVERS:         kafka:9092
    KAFKA_TOPIC:                     ${KAFKA_TOPIC}
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy


services:

  # ── Zookeeper ──────────────────────────────────────────────────────────── #
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-txn-logs:/var/lib/zookeeper/log
    healthcheck:
      # 'srvr' is whitelisted by default in this image (unlike 'ruok').
      # Response contains "Mode: standalone" when ZooKeeper is ready.
      test:
        - "CMD-SHELL"
        - "bash -c 'exec 3<>/dev/tcp/localhost/2181 && echo -n srvr >&3 && timeout 2 cat <&3 | grep -q standalone'"
      interval:     10s
      timeout:      10s
      start_period: 30s
      retries:      10

  # ── Kafka ──────────────────────────────────────────────────────────────── #
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"   # host access (optional, for local debugging)
    environment:
      KAFKA_BROKER_ID:                         1
      KAFKA_ZOOKEEPER_CONNECT:                 zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:    INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:              INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME:        INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:  1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:         "false"
      KAFKA_LOG_RETENTION_HOURS:               168
      KAFKA_LOG_SEGMENT_BYTES:                 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:         ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval:     15s
      timeout:      10s
      start_period: 30s   # wait for ZooKeeper handshake before counting failures
      retries:      10

  # ── Topic initialisation (runs once) ───────────────────────────────────── #
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic github.raw.events \
          --partitions 3 \
          --replication-factor 1 \
          --config retention.ms=604800000 && \
        echo "Topic created (or already exists)."
    restart: "no"

  # ── GitHub Poller ──────────────────────────────────────────────────────── #
  poller:
    build:
      context:    .
      dockerfile: poller/Dockerfile
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - poller-state:/tmp   # persist ETag + last_event_id across restarts

  # ── PostgreSQL (Airflow metadata) ──────────────────────────────────────── #
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Airflow DB migration + admin user (runs once) ──────────────────────── #
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username  ${AIRFLOW_ADMIN_USER} \
          --password  ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname  User \
          --role      Admin \
          --email     admin@gitstream.local
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────── #
  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test:     ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ── Airflow Scheduler ──────────────────────────────────────────────────── #
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully


# ── Named volumes ──────────────────────────────────────────────────────────── #
volumes:
  zk-data:
  zk-txn-logs:
  kafka-data:
  pg-data:
  airflow-logs:
  poller-state:
