version: "3.9"

# ── Shared Airflow config ──────────────────────────────────────────────────── #
# Kafka는 Upstash(외부 클라우드)를 사용하므로 로컬 브로커 서비스가 없다.
# 연결 정보는 모두 .env 에서 주입된다.
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file: .env
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY:    ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS:  airflow.api.auth.backend.basic_auth
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy


services:

  # ── GitHub Poller ──────────────────────────────────────────────────────────── #
  # Upstash Kafka 로 직접 produce 한다. 연결 정보는 .env 에서 주입.
  poller:
    build:
      context:    .
      dockerfile: poller/Dockerfile
    env_file: .env
    restart: unless-stopped
    volumes:
      - poller-state:/tmp   # ETag + last_event_id 상태 유지

  # ── PostgreSQL (Airflow metadata) ──────────────────────────────────────────── #
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Airflow DB migration + admin user (runs once) ──────────────────────────── #
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username  ${AIRFLOW_ADMIN_USER} \
          --password  ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname  User \
          --role      Admin \
          --email     admin@gitstream.local
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────────── #
  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test:     ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ── Airflow Scheduler ──────────────────────────────────────────────────────── #
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully


# ── Named volumes ──────────────────────────────────────────────────────────── #
volumes:
  pg-data:
  airflow-logs:
  poller-state:
